services:
  - type: web
    name: trabalho-protesto-api
    env: node
    rootDir: backend
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3333
      - key: CORS_ORIGIN
        sync: false
